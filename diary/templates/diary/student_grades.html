{% extends "diary/base.html" %}

{% block content %}

<div class="card p-4">

<h3 class="mb-4">
{{ subject.name }} — {{ school_class }}
</h3>

<form method="post">

{% csrf_token %}

<div class="table-responsive">

<table class="table table-dark table-hover align-middle">

<thead>

<tr>
<th>Учень</th>
<th>Оцінка</th>
<th>Дата</th>
</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>
{{ student.user.username }}
</td>

<td>

<input
type="number"
name="grade_{{ student.id }}"
min="1"
max="12"
class="form-control"
>

</td>

<td>

<input
type="date"
name="date_{{ student.id }}"
value="{{ today }}"
class="form-control"
>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<button class="btn btn-success mt-3">
Зберегти оцінки
</button>

</form>

</div>

{% endblock %}
