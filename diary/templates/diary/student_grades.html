{% extends "diary/base.html" %}

{% block content %}
<h1>{{ subject.name }} - {{ school_class }}</h1>

<form method="post">
    {% csrf_token %}
    <table>
        <tr>
            <th>Учень</th>
            <th>Оцінка</th>
            <th>Дата</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.user.username }}</td>
            <td>
                <input type="number" name="grade_{{ student.id }}" min="1" max="12">
            </td>
            <td>
                <input type="date" name="date_{{ student.id }}" value="{{ today }}">
            </td>
        </tr>
        {% endfor %}
    </table>
    <button type="submit">Зберегти оцінки</button>
</form>
{% endblock %}
