<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">

<head>
<meta charset="UTF-8">
<title>School Diary</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: "Inter", sans-serif;
    background:#0f172a;
}

/* NAVBAR */

.navbar{
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.navbar-brand{
    font-weight:600;
    font-size:20px;
}

.nav-link{
    font-weight:500;
    font-size:15px;
}

/* CONTENT */

.container{
    max-width:1200px;
}

/* CARDS */

.card{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:12px;
}

/* TABLE */

.table{
    border-radius:12px;
    overflow:hidden;
}

.table thead th{
    font-weight:600;
    color:#94a3b8;
    border-bottom:1px solid #1e293b;
}

.table tbody tr:hover{
    background:#020617;
}

/* BUTTONS */

.btn{
    font-weight:500;
    border-radius:8px;
}

/* FORMS */

.form-select,
.form-control{
    background:#020617;
    border:1px solid #1e293b;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="{% url 'student_list' %}">
📘 School Diary
</a>

<div class="navbar-nav">

<a class="nav-link" href="{% url 'student_list' %}">
Список оцінок
</a>

<a class="nav-link" href="{% url 'subject_list' %}">
Поставити оцінки
</a>

<a class="nav-link" href="{% url 'my_grades' %}">
Мої оцінки
</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
