{% extends "diary/base.html" %}

{% block content %}
<div class="container my-4">
    <div class="card bg-dark text-light shadow-sm">
        <div class="card-body">
            <h3 class="card-title mb-4">Редагувати оцінку</h3>


            <div class="mb-3">
                <label class="form-label fw-bold">Учень:</label>
                <input type="text" class="form-control bg-secondary text-light" value="{{ object.student.user.username }}" disabled>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Предмет:</label>
                <input type="text" class="form-control bg-secondary text-light" value="{{ object.subject.name }}" disabled>
            </div>


            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.grade.label_tag }}
                    {{ form.grade }}
                </div>
                <div class="mb-3">
                    {{ form.date.label_tag }}
                    {{ form.date }}
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Зберегти зміни</button>
                    <a href="{% url 'student_list' %}" class="btn btn-secondary">Відмінити</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
